<script>

window.addEventListener("load",()=>{

    const canvas=document.getElementById("estadoCanvas");

    const ctx=canvas.getContext("2d");

    function resize(){

        canvas.width=window.innerWidth;

        canvas.height=window.innerHeight;

    }

    resize();

    window.addEventListener("resize",resize);

   const player = tour.player.getById("MainViewerPanoramaPlayer");

const lote = {

    yaw:-75.03231418757888,

    pitch:-58.40546325256681

};

let x=0;
let y=0; 
function dibujar(){

        ctx.clearRect(

            0,

            0,

            canvas.width,

            canvas.height

        );

        const camYaw=player.get("yaw");

const camPitch=player.get("pitch");

const hfov=player.get("actualHFOV");

const vfov=hfov*(canvas.height/canvas.width);

const dx=lote.yaw-camYaw;

const dy=lote.pitch-camPitch;
console.clear();

console.log("CAMARA");

console.log(camYaw);

console.log(camPitch);

console.log(hfov);

console.log("LOTE");

console.log(lote.yaw);

console.log(lote.pitch);

console.log("DX",dx);

console.log("DY",dy);

console.log("X",x);

console.log("Y",y);

x=canvas.width/2+(dx/hfov)*canvas.width;

y=canvas.height/2+(dy/vfov)*canvas.height;

const puntos = [

[-85.04888875263237,-54.7102581111818],

[-70.41364840554282,-53.010437284280314],

[-62.81332497978119,-60.72314262092043],

[-81.76594053506787,-63.96328706377697]

];

ctx.fillStyle="red";

for(const p of puntos){

    const dx = p[0] - camYaw;
    const dy = p[1] - camPitch;

    const px = canvas.width/2 + (dx/hfov)*canvas.width;
    const py = canvas.height/2 + (dy/vfov)*canvas.height;

    ctx.beginPath();

    ctx.arc(

        px,

        py,

        8,

        0,

        Math.PI*2

    );

    ctx.fill();

}

        requestAnimationFrame(dibujar);

    }

    dibujar();

});

</script>
